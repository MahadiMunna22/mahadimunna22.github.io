<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Mahadi Hassan Munna</title>
  <script>(function(){var t=localStorage.getItem("pt")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="data.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter','sans-serif'], mono: ['Fira Code','monospace'] },
        colors: { bg:'#07090F', surface:'#0C1120', border:'#1E2D4A', primary:'#8B5CF6', cyan:'#22D3EE', pink:'#F472B6', green:'#4ADE80', amber:'#F59E0B' }
      }}
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #07090F; color: #E2E8F0; font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }
    #cursor { position:fixed; width:10px; height:10px; background:#8B5CF6; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); mix-blend-mode:screen; transition:transform .1s, background .2s; }
    #cursor-ring { position:fixed; width:34px; height:34px; border:1.5px solid rgba(139,92,246,.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all .15s ease; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#07090F; }
    ::-webkit-scrollbar-thumb { background:linear-gradient(#8B5CF6,#22D3EE); border-radius:2px; }
    #progress-bar { position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,#8B5CF6,#22D3EE,#F472B6); z-index:1000; transition:width .1s; }
    .glass { background:rgba(10,12,28,.75); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(139,92,246,.18); border-radius:20px; transition:all .3s ease; box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(139,92,246,.07); }
    .glass:hover { border-color:rgba(139,92,246,.38); box-shadow:0 0 40px rgba(139,92,246,.12),0 20px 50px rgba(0,0,0,.4); }
    .grad { background:linear-gradient(135deg,#8B5CF6 0%,#22D3EE 50%,#F472B6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stag { font-family:'Fira Code',monospace; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:#8B5CF6; }
    .tbadge { display:inline-flex; align-items:center; padding:5px 14px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid; transition:all .2s; }
    .hero-grid { background-image:linear-gradient(rgba(139,92,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.04) 1px,transparent 1px); background-size:60px 60px; }
    .nav-link { font-size:13px; font-weight:500; color:#94A3B8; transition:color .2s; }
    .nav-link:hover { color:#fff; }
    .screenshot-main { width:100%; height:340px; object-fit:cover; border-radius:12px; display:block; cursor:zoom-in; transition:transform .3s; }
    .screenshot-thumb { width:100%; height:160px; object-fit:cover; border-radius:10px; display:block; cursor:zoom-in; transition:transform .3s; }
    .screenshot-main:hover, .screenshot-thumb:hover { transform:scale(1.02); }
    .img-wrap { overflow:hidden; border-radius:12px; border:1px solid rgba(139,92,246,.12); background:rgba(10,12,28,.6); }
    .img-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; height:100%; min-height:180px; border:2px dashed rgba(139,92,246,.25); border-radius:12px; color:#4B5563; font-size:12px; font-family:'Fira Code',monospace; background:rgba(139,92,246,.04); }
    .img-placeholder .icon { font-size:28px; color:rgba(139,92,246,.3); }
    .video-wrapper { position:relative; width:100%; padding-bottom:56.25%; border-radius:14px; overflow:hidden; }
    .video-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
    .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .tl-line { position:absolute; left:4px; top:16px; bottom:0; width:2px; background:linear-gradient(to bottom,rgba(139,92,246,.4),transparent); }
    .metric-card { border-radius:16px; padding:20px; text-align:center; border:1px solid; transition:transform .2s; }
    .metric-card:hover { transform:translateY(-3px); }
    .stack-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(139,92,246,.07); }
    .stack-row:last-child { border-bottom:none; }
    .stack-dot { width:8px; height:8px; border-radius:50%; margin-right:10px; flex-shrink:0; }
    .status-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; }
    .status-deployed { color:#4ADE80; background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.3); }
    .status-published { color:#8B5CF6; background:rgba(139,92,246,.12); border:1px solid rgba(139,92,246,.3); }
    .detail-label { font-size:11px; color:#4B5563; margin-bottom:3px; font-family:'Fira Code',monospace; text-transform:uppercase; letter-spacing:1px; }
    .detail-val { font-size:13px; color:#E2E8F0; font-weight:500; }

    /* Lightbox */
    #lightbox { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:10000; display:none; align-items:center; justify-content:center; padding:20px; }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:90vw; max-height:88vh; border-radius:12px; object-fit:contain; box-shadow:0 0 80px rgba(139,92,246,.25); }
    #lb-close { position:absolute; top:20px; right:24px; color:#fff; font-size:22px; cursor:pointer; background:rgba(139,92,246,.2); border:none; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; transition:all .2s; opacity:.8; }
    #lb-close:hover { opacity:1; background:rgba(139,92,246,.45); }
    #lb-prev, #lb-next { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:18px; cursor:pointer; background:rgba(139,92,246,.2); border:none; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; transition:all .2s; opacity:.75; }
    #lb-prev { left:16px; } #lb-next { right:16px; }
    #lb-prev:hover, #lb-next:hover { opacity:1; background:rgba(139,92,246,.45); }
    #lb-counter { position:absolute; top:22px; left:50%; transform:translateX(-50%); color:#6B7280; font-size:12px; font-family:'Fira Code',monospace; }
    @keyframes lb-in { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
    #lightbox.open img { animation:lb-in .2s ease; }

    /* Theme toggle */
    #theme-toggle { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(139,92,246,.35); background:rgba(139,92,246,.1); color:#A78BFA; cursor:pointer; transition:all .25s; font-size:14px; flex-shrink:0; }
    #theme-toggle:hover { background:rgba(139,92,246,.25); border-color:rgba(139,92,246,.6); color:#fff; transform:scale(1.08); }

    /* Light theme */
    html[data-theme="light"] body { background:#F0F4FF; color:#0F172A; cursor:auto; }
    html[data-theme="light"] #cursor, html[data-theme="light"] #cursor-ring { display:none; }
    html[data-theme="light"] ::-webkit-scrollbar-track { background:#F0F4FF; }
    html[data-theme="light"] ::-webkit-scrollbar-thumb { background:linear-gradient(#7C3AED,#0891B2); }
    html[data-theme="light"] #progress-bar { background:linear-gradient(90deg,#7C3AED,#0891B2,#DB2777); }
    html[data-theme="light"] .hero-grid {
      background-image:linear-gradient(rgba(124,58,237,.05) 1px,transparent 1px), 
      linear-gradient(90deg,rgba(124,58,237,.05) 1px,transparent 1px);
    }    
    html[data-theme="dark"] .hero-grid { background-image:linear-gradient(rgba(139,92,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.04) 1px,transparent 1px); background-size:60px 60px; }
    html[data-theme="light"] .glass { background:rgba(255,255,255,.92); border-color:rgba(124,58,237,.12); box-shadow:0 2px 16px rgba(15,23,42,.07),inset 0 1px 0 rgba(255,255,255,.8); color:#0F172A; }
    html[data-theme="light"] .glass:hover { border-color:rgba(124,58,237,.28); box-shadow:0 8px 32px rgba(124,58,237,.1); }
    html[data-theme="light"] .text-white { color:#0F172A !important; }
    html[data-theme="light"] .text-gray-300 { color:#374151 !important; }
    html[data-theme="light"] .text-gray-400 { color:#475569 !important; }
    html[data-theme="light"] .text-gray-500 { color:#64748B !important; }
    html[data-theme="light"] .text-gray-600 { color:#94A3B8 !important; }
    html[data-theme="light"] .stag { color:#7C3AED; }
    html[data-theme="light"] .nav-link { color:#475569; }
    html[data-theme="light"] .nav-link:hover { color:#0F172A; }
    html[data-theme="light"] .detail-label { color:#94A3B8; }
    html[data-theme="light"] .detail-val { color:#0F172A; }
    html[data-theme="light"] .stack-row { border-bottom-color:rgba(124,58,237,.08); }
    html[data-theme="light"] .img-wrap { border-color:rgba(124,58,237,.12); background:rgba(255,255,255,.6); }
    html[data-theme="light"] .img-placeholder { border-color:rgba(124,58,237,.2); background:rgba(124,58,237,.03); color:#64748B; }
    html[data-theme="light"] .tl-line { background:linear-gradient(to bottom,rgba(124,58,237,.3),transparent); }
    html[data-theme="light"] footer { background:#E8EEFF; border-color:rgba(124,58,237,.15) !important; }
    html[data-theme="light"] footer p { color:#64748B !important; }
    html[data-theme="light"] footer p span { color:#7C3AED !important; }
    html[data-theme="light"] #theme-toggle { border-color:rgba(124,58,237,.3); background:rgba(124,58,237,.08); color:#7C3AED; }
    html[data-theme="light"] #theme-toggle:hover { background:rgba(124,58,237,.18); border-color:rgba(124,58,237,.5); color:#5B21B6; }
    html[data-theme="light"] .status-deployed { background:rgba(22,163,74,.1); border-color:rgba(22,163,74,.3); }
    html[data-theme="light"] .status-published { background:rgba(124,58,237,.1); border-color:rgba(124,58,237,.3); }
    @media(max-width:768px) { .screenshot-main { height:220px; } .screenshot-thumb { height:130px; } }
    
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div id="progress-bar" style="width:0%"></div>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" onclick="if(event.target===this)closeLightbox()">
    <button id="lb-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
    <button id="lb-prev" onclick="lbNav(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <img id="lb-img" src="" alt=""/>
    <button id="lb-next" onclick="lbNav(1)"><i class="fa-solid fa-chevron-right"></i></button>
    <div id="lb-counter"></div>
  </div>

  <!-- Navbar -->
  <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 px-6 py-5">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="index.html" class="font-mono text-base font-bold text-white flex-shrink-0">
        <span class="text-primary">&lt;</span>Munna<span class="text-cyan">/</span><span class="text-primary">&gt;</span>
      </a>
      <div class="flex items-center gap-2 md:gap-4">
        <a href="index.html#projects" class="flex items-center gap-1.5 text-xs md:text-sm nav-link">
          <i class="fa-solid fa-arrow-left text-xs"></i>
          <span class="hidden sm:inline">Back to Projects</span><span class="sm:hidden">Back</span>
        </a>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        <a href="index.html#contact" class="hidden md:inline-flex items-center gap-2 text-sm font-semibold text-[#fff] px-5 py-2.5 rounded-full" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9)">
          <i class="fa-solid fa-paper-plane text-xs"></i> Hire Me
        </a>
      </div>
    </div>
  </nav>

  <div id="page-content"></div>

  <footer class="relative z-10 border-t py-8 text-center" style="border-color:rgba(139,92,246,.1)">
    <p class="text-gray-500 text-sm">Designed &amp; Built by <span class="text-primary font-semibold">Mahadi Hassan Munna</span></p>
    <p class="text-gray-600 text-xs font-mono mt-1">&#169; 2025 &mdash; Bern, Switzerland &#127464;&#127469;</p>
  </footer>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration:800, once:true, offset:60 });

    /* ── Cursor ── */
    var curEl = document.getElementById('cursor');
    var ringEl = document.getElementById('cursor-ring');
    var mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; curEl.style.left=mx+'px'; curEl.style.top=my+'px'; });
    (function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ringEl.style.left=rx+'px'; ringEl.style.top=ry+'px'; requestAnimationFrame(animRing); })();

    /* ── Scroll ── */
    window.addEventListener('scroll', function(){
      var s = document.documentElement;
      document.getElementById('progress-bar').style.width = (s.scrollTop/(s.scrollHeight-s.clientHeight)*100)+'%';
      var nav = document.getElementById('navbar');
      var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      if(window.scrollY > 50){
        nav.style.background = isDark ? 'rgba(7,9,15,0.95)' : 'rgba(240,244,255,0.95)';
        nav.style.backdropFilter = 'blur(20px)';
        nav.style.boxShadow = '0 1px 20px rgba(0,0,0,.12)';
        nav.style.paddingTop = '10px'; nav.style.paddingBottom = '10px';
      } else {
        nav.style.background = 'transparent';
        nav.style.backdropFilter = 'none';
        nav.style.boxShadow = 'none';
        nav.style.paddingTop = ''; nav.style.paddingBottom = '';
      }
    });

    /* ── Theme ── */
    function initTheme(){
      var t = localStorage.getItem('pt') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      updateToggleIcon(t);
    }
    function toggleTheme(){
      var cur = document.documentElement.getAttribute('data-theme') || 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pt', next);
      updateToggleIcon(next);
      applyHeroBg(window._projColor);
      window.dispatchEvent(new Event('scroll'));
    }
    function updateToggleIcon(t){
      var btn = document.getElementById('theme-toggle');
      if(!btn) return;
      btn.innerHTML = t === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
      btn.title = t === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
    }
    /* Hero bg is JS-driven so it beats inline styles */
    function applyHeroBg(color){
      var hero = document.getElementById('proj-hero');
      if(!hero || !color) return;
      var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      hero.style.background = isDark
        ? 'radial-gradient(ellipse 80% 60% at 50% 0%,'+color+'18 0%,transparent 60%),#07090F'
        : '';
    }
    initTheme();

    /* ── Lightbox ── */
    var lbImages = [], lbIdx = 0;
    function openLightbox(images, idx){
      lbImages = images.filter(function(x){ return !!x; });
      lbIdx = idx || 0;
      if(!lbImages.length) return;
      lbShow();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      document.addEventListener('keydown', lbKeyHandler);
    }
    function closeLightbox(){
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', lbKeyHandler);
    }
    function lbShow(){
      document.getElementById('lb-img').src = lbImages[lbIdx];
      document.getElementById('lb-counter').textContent = lbImages.length > 1 ? (lbIdx+1)+' / '+lbImages.length : '';
      document.getElementById('lb-prev').style.display = lbImages.length > 1 ? 'flex' : 'none';
      document.getElementById('lb-next').style.display = lbImages.length > 1 ? 'flex' : 'none';
    }
    function lbNav(dir){ lbIdx = (lbIdx+dir+lbImages.length)%lbImages.length; lbShow(); }
    function lbKeyHandler(e){
      if(e.key==='Escape') closeLightbox();
      if(e.key==='ArrowRight') lbNav(1);
      if(e.key==='ArrowLeft') lbNav(-1);
    }

    /* ── Load project ── */
    var params = new URLSearchParams(window.location.search);
    var pid = params.get('id') || 'idlc-customer-app';
    var proj = PortfolioData.projects[pid];

    if(!proj){
      document.getElementById('page-content').innerHTML =
        '<div class="min-h-screen flex items-center justify-center text-gray-500 text-xl pt-32">Project not found.</div>';
    } else {
      document.title = proj.title + ' \u2014 Mahadi Hassan Munna';
      var c = proj.color;
      var imgs = proj.images || [];
      window._projColor = c;
      var others = Object.values(PortfolioData.projects).filter(function(p){ return p.id !== pid; });

      var catColors = { Frontend:'#22D3EE', Backend:'#8B5CF6', AI:'#F472B6', Database:'#4ADE80', Analytics:'#F59E0B', Language:'#94A3B8', DevOps:'#60A5FA', Testing:'#A78BFA', 'ML Model':'#F472B6', 'ML Framework':'#C084FC', Vision:'#34D399', IoT:'#F97316', GUI:'#818CF8', Voice:'#A78BFA', Integration:'#22D3EE', Styling:'#38BDF8', Cache:'#FCD34D' };
      var metricAccents = [c, '#F472B6', '#4ADE80', '#F59E0B'];

      var statusClass = (proj.status && proj.status.indexOf('Q1') > -1) ? 'status-published' : 'status-deployed';
      var statusBadge = '<span class="status-badge '+statusClass+'"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>'+(proj.status||'Active')+'</span>';

      var tagChips = (proj.tags||[]).map(function(t){
        return '<span class="tbadge" style="color:'+c+';border-color:'+c+'40;background:'+c+'10">'+t+'</span>';
      }).join('');

      var stackRows = (proj.stack||[]).map(function(s){
        var sc = catColors[s.category]||'#8B5CF6';
        return '<div class="stack-row"><div class="flex items-center"><div class="stack-dot" style="background:'+sc+'"></div><span class="text-sm text-gray-300">'+s.name+'</span></div><span class="text-xs px-2 py-0.5 rounded-full" style="color:'+sc+';background:'+sc+'15;border:1px solid '+sc+'30">'+s.category+'</span></div>';
      }).join('');

      var metricsHtml = (proj.metrics||[]).map(function(m,i){
        var mc = metricAccents[i % metricAccents.length];
        return '<div class="metric-card" style="background:'+mc+'0d;border-color:'+mc+'25"><div class="text-3xl font-black" style="color:'+mc+'">'+m.value+'</div><div class="text-gray-400 text-xs mt-1">'+m.label+'</div></div>';
      }).join('');

      var featuresHtml = (proj.features||[]).map(function(f){
        return '<li class="flex items-start gap-3 text-sm text-gray-400"><i class="fa-solid fa-check text-xs mt-1" style="color:'+c+'"></i><span>'+f+'</span></li>';
      }).join('');

      var timelineHtml = (proj.timeline||[]).map(function(t,i){
        return '<div class="flex gap-4 relative pl-6 pb-6" data-aos="fade-up" data-aos-delay="'+(i*80)+'">'
          +'<div class="tl-line"></div>'
          +'<div class="tl-dot" style="background:'+c+';position:absolute;left:0;top:4px"></div>'
          +'<div><div class="text-xs font-mono mb-0.5" style="color:'+c+'">'+t.date+'</div>'
          +'<div class="font-semibold text-white text-sm">'+t.phase+'</div>'
          +'<div class="text-gray-400 text-xs mt-1">'+t.desc+'</div></div></div>';
      }).join('');

      /* Video — only render when URL is set */
      var videoHtml = (proj.videoUrl && proj.videoUrl.trim())
        ? '<div class="glass p-5 rounded-2xl" data-aos="fade-up">'
          +'<h3 class="font-bold text-white text-base mb-4 flex items-center gap-2">'
          +'<span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs" style="background:'+c+'20;color:'+c+'"><i class="fa-solid fa-play"></i></span>Demo Video</h3>'
          +'<div class="video-wrapper"><iframe src="'+proj.videoUrl+'" title="Demo" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe></div></div>'
        : '';

      /* Links */
      var linksHtml = '';
      if(proj.links && proj.links.live)
        linksHtml += '<a href="'+proj.links.live+'" target="_blank" class="flex items-center gap-2 text-sm px-4 py-2 rounded-xl" style="background:'+c+'20;color:'+c+';border:1px solid '+c+'35"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>Live Demo</a>';
      if(proj.links && proj.links.github)
        linksHtml += '<a href="'+proj.links.github+'" target="_blank" class="flex items-center gap-2 text-sm px-4 py-2 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white" style="border:1px solid rgba(139,92,246,.2)"><i class="fa-brands fa-github text-xs"></i>Source Code</a>';

      /* Other project cards */
      var otherCards = others.slice(0,3).map(function(p){
        return '<a href="project.html?id='+p.id+'" class="glass p-5 rounded-2xl group hover:-translate-y-1 transition-transform block">'
          +'<div class="flex items-start gap-4">'
          +'<div class="w-12 h-12 rounded-xl flex-shrink-0 flex items-center justify-center text-lg" style="background:'+p.color+'20;color:'+p.color+'">'
          +'<i class="fa-solid fa-'+p.icon+'"></i></div>'
          +'<div class="min-w-0"><h4 class="font-bold text-white text-sm leading-snug mb-1 group-hover:text-primary transition">'+p.title+'</h4>'
          +'<p class="text-gray-500 text-xs">'+p.subtitle+'</p>'
          +'<div class="flex items-center gap-1 text-xs font-semibold mt-2" style="color:'+p.color+'">View Details <i class="fa-solid fa-arrow-right text-xs ml-1"></i></div>'
          +'</div></div></a>';
      }).join('');

      /* Screenshots — NO inline onclick; we use data-idx + addEventListener after inject */
      var hasImages = imgs.some(function(s){ return !!s; });
      var screenshotsHtml = '';
      if(hasImages){
        var mainImg = imgs[0]
          ? '<div class="img-wrap"><img src="'+imgs[0]+'" alt="Screenshot 1" class="screenshot-main lb-img" data-idx="0" loading="lazy"/></div>'
          : '';
        var thumb1 = imgs[1]
          ? '<div class="img-wrap"><img src="'+imgs[1]+'" alt="Screenshot 2" class="screenshot-thumb lb-img" data-idx="1" loading="lazy"/></div>'
          : '<div class="img-wrap"><div class="img-placeholder" style="min-height:160px"><div class="icon"><i class="fa-regular fa-image"></i></div></div></div>';
        var thumb2 = imgs[2]
          ? '<div class="img-wrap"><img src="'+imgs[2]+'" alt="Screenshot 3" class="screenshot-thumb lb-img" data-idx="2" loading="lazy"/></div>'
          : '<div class="img-wrap"><div class="img-placeholder" style="min-height:160px"><div class="icon"><i class="fa-regular fa-image"></i></div></div></div>';
        screenshotsHtml =
          '<div data-aos="fade-up">'
          +'<p class="stag mb-4">Screenshots <span style="font-size:10px;letter-spacing:1px;opacity:.5;text-transform:none;font-family:Inter,sans-serif">(click to enlarge)</span></p>'
          +'<div class="space-y-3">'+mainImg
          +'<div class="grid grid-cols-2 gap-3">'+thumb1+thumb2+'</div>'
          +'</div></div>';
      }

      document.getElementById('page-content').innerHTML = `
        <section id="proj-hero" class="relative min-h-[46vh] flex items-end pt-28 pb-16 hero-grid overflow-hidden">
          <div class="absolute inset-0 opacity-20"
            style="background:radial-gradient(circle at 70% 50%,${c}28 0%,transparent 50%)"></div>
          <div class="max-w-5xl mx-auto px-4 md:px-6 w-full relative z-10">
            <div class="flex flex-wrap items-center gap-3 mb-5">
              <div class="inline-flex items-center gap-2 rounded-xl px-4 py-2"
                style="background:${c}18;border:1px solid ${c}30;color:${c}">
                <i class="fa-solid fa-${proj.icon} text-base"></i>
                <span class="text-xs font-mono">${proj.company}</span>
              </div>
              ${statusBadge}
            </div>
            <h1 class="text-3xl md:text-5xl font-black text-white leading-tight mb-3">${proj.title}</h1>
            <p class="text-gray-300 text-base md:text-lg mb-2">${proj.subtitle}</p>
            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 mb-5">
              <span class="flex items-center gap-1.5"><i class="fa-regular fa-calendar text-xs"></i>${proj.period}</span>
              <span class="flex items-center gap-1.5"><i class="fa-regular fa-user text-xs"></i>${proj.role}</span>
            </div>
            <div class="flex flex-wrap items-center gap-3">
              <div class="flex flex-wrap gap-2">${tagChips}</div>
              ${linksHtml ? `<div class="flex gap-3 flex-wrap">${linksHtml}</div>` : ''}
            </div>
          </div>
        </section>

        <div class="max-w-5xl mx-auto px-4 md:px-6 py-12 md:py-16">
          <div class="grid lg:grid-cols-3 gap-6 md:gap-8">

            <!-- Main column -->
            <div class="lg:col-span-2 space-y-6 md:space-y-8">
              ${screenshotsHtml}
              ${videoHtml}

              <div class="grid md:grid-cols-2 gap-4" data-aos="fade-up">
                <div class="glass p-6 rounded-2xl">
                  <h3 class="font-bold text-white mb-3 flex items-center gap-2">
                    <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs"
                      style="background:#F472B620;color:#F472B6">
                      <i class="fa-solid fa-triangle-exclamation"></i>
                    </span>
                    The Challenge
                  </h3>
                  <p class="text-gray-400 text-sm leading-relaxed">${proj.challenge}</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                  <h3 class="font-bold text-white mb-3 flex items-center gap-2">
                    <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs"
                      style="background:${c}20;color:${c}">
                      <i class="fa-solid fa-lightbulb"></i>
                    </span>
                    The Solution
                  </h3>
                  <p class="text-gray-400 text-sm leading-relaxed">${proj.solution}</p>
                </div>
              </div>

              <div class="glass p-6 rounded-2xl" data-aos="fade-up">
                <h3 class="font-bold text-white mb-5 flex items-center gap-2">
                  <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs"
                    style="background:${c}20;color:${c}">
                    <i class="fa-solid fa-chart-simple"></i>
                  </span>
                  Key Metrics
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">${metricsHtml}</div>
              </div>

              <div class="glass p-6 rounded-2xl" data-aos="fade-up">
                <h3 class="font-bold text-white mb-4 flex items-center gap-2">
                  <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs"
                    style="background:${c}20;color:${c}">
                    <i class="fa-solid fa-list-check"></i>
                  </span>
                  Features
                </h3>
                <ul class="space-y-2.5">${featuresHtml}</ul>
              </div>

              <div class="glass p-6 rounded-2xl" data-aos="fade-up">
                <h3 class="font-bold text-white mb-6 flex items-center gap-2">
                  <span class="w-7 h-7 rounded-lg flex items-center justify-center text-xs"
                    style="background:${c}20;color:${c}">
                    <i class="fa-solid fa-timeline"></i>
                  </span>
                  Development Timeline
                </h3>
                <div>${timelineHtml}</div>
              </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-5">
              <div class="glass p-5 rounded-2xl" data-aos="fade-left">
                <h3 class="font-bold text-white text-sm mb-4 flex items-center gap-2">
                  <i class="fa-solid fa-circle-info" style="color:${c}"></i>
                  Project Info
                </h3>
                <div>
                  <div class="py-2.5 border-b" style="border-color:rgba(139,92,246,.08)">
                    <div class="detail-label">Status</div>
                    <div class="detail-val">${statusBadge}</div>
                  </div>
                  <div class="py-2.5 border-b" style="border-color:rgba(139,92,246,.08)">
                    <div class="detail-label">Period</div>
                    <div class="detail-val">${proj.period}</div>
                  </div>
                  <div class="py-2.5 border-b" style="border-color:rgba(139,92,246,.08)">
                    <div class="detail-label">Role</div>
                    <div class="detail-val">${proj.role}</div>
                  </div>
                  <div class="py-2.5">
                    <div class="detail-label">Category</div>
                    <div class="detail-val">${proj.category}</div>
                  </div>
                </div>
              </div>

              <div class="glass p-5 rounded-2xl" data-aos="fade-left" data-aos-delay="60">
                <h3 class="font-bold text-white text-sm mb-4 flex items-center gap-2">
                  <i class="fa-solid fa-layer-group" style="color:${c}"></i>
                  Tech Stack
                </h3>
                <div>${stackRows}</div>
              </div>

              ${others.length ? `
              <div data-aos="fade-left" data-aos-delay="100">
                <h3 class="font-bold text-white text-sm mb-4 px-1 flex items-center gap-2">
                  <i class="fa-solid fa-grid-2" style="color:${c}"></i>
                  Other Projects
                </h3>
                <div class="space-y-4">${otherCards}</div>
              </div>` : ''}

            </div>
          </div>
        </div>
      `;

      /* Apply hero bg after injection */
      applyHeroBg(c);
      AOS.refresh();

      /* Add lightbox listeners to screenshot images (avoids inline onclick escaping bugs) */
      var validImgs = imgs.filter(function(s){ return !!s; });
      document.querySelectorAll('.lb-img').forEach(function(el){
        el.addEventListener('click', function(){
          openLightbox(validImgs, parseInt(el.getAttribute('data-idx')) || 0);
        });
      });
    }
  </script>
</body>
</html>
